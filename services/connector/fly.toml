# Ecqqo WhatsApp Connector — Multi-User Supervisor
# Manages multiple WhatsApp sessions per machine via child_process.fork().

app = "ecqqo-connector"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"
  # Build context is the repo root (needed for shared/ and convex/)
  # Deploy with: fly deploy --config services/connector/fly.toml --dockerfile services/connector/Dockerfile .

[env]
  AUTH_DIR = "/tmp/wa-auth"
  CONNECTOR_MODE = "supervisor"
  MAX_WORKERS = "20"

# tmpfs mount for auth state — keys never persist to disk
[mounts]
  source = "wa_auth"
  destination = "/tmp/wa-auth"

# HTTP service for supervisor API
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
